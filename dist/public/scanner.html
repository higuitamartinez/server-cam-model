<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Document scanner embebible" />
    <title>Document Scanner</title>
    <link rel="stylesheet" href="/scanner.css" />
  </head>
  <body>
    <main class="scanner-shell" data-screen="loading">
      <section class="message-screen" data-view="loading">
        <div class="spinner" aria-hidden="true"></div>
        <p>Cargando scanner...</p>
      </section>

      <section class="message-screen error-screen" data-view="error" hidden>
        <p id="errorMessage">No se pudo iniciar el scanner.</p>
        <button class="button secondary" id="retryCameraButton" type="button">Reintentar</button>
      </section>

      <section class="camera-screen" data-view="camera" hidden>
        <header class="scanner-header">
          <button class="icon-button" id="closeButton" type="button" aria-label="Volver">
            <span aria-hidden="true">‹</span>
          </button>
          <h1>Escanea el documento</h1>
        </header>

        <div class="camera-frame">
          <video id="cameraVideo" class="camera-video" playsinline autoplay muted></video>
          <canvas id="captureCanvas" hidden></canvas>
          <svg id="guideOverlay" class="guide-overlay" aria-hidden="true"></svg>
          <svg id="debugOverlay" class="debug-overlay" aria-hidden="true"></svg>

          <div class="progress-container" id="progressContainer" hidden>
            <p>Manten el documento estable</p>
            <div class="progress-track">
              <div class="progress-bar" id="progressBar"></div>
            </div>
          </div>
        </div>

        <footer class="scanner-footer">
          <h2>Ubica el documento dentro del rectangulo</h2>
        </footer>
      </section>

      <section class="captured-screen" data-view="captured" hidden>
        <div class="captured-content">
          <div class="check-icon" aria-hidden="true">
            <svg width="72" height="72" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"></circle>
              <path d="M8 12.5 10.5 15 16 9.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </div>
          <p class="captured-title">¿La foto se ve bien?</p>
          <img id="capturedImage" class="captured-image" alt="Documento capturado" />
          <div class="button-stack">
            <button class="button primary" id="confirmButton" type="button">Si, continuar</button>
            <button class="button secondary" id="retakeButton" type="button">Volver a tomar la foto</button>
          </div>
        </div>
      </section>

      <section class="captured-screen" data-view="processing" hidden>
        <div class="captured-content">
          <div class="spinner large" aria-hidden="true"></div>
          <p class="captured-title">Analizando documento</p>
          <img id="processingImage" class="captured-image analyzing" alt="Documento en analisis" />
        </div>
      </section>
    </main>

    <script async src="https://docs.opencv.org/4.8.0/opencv.js"></script>
    <script src="/scanner.js" defer></script>
  </body>
</html>
